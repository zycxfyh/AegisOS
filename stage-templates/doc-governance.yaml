# Stage Template: Document Governance Stage
# =============================================================================
# Ordivon-CATLASS: Governance Pipeline Template
#
# Updated: GOS-PM-10 (2026-05-11) — incorporates PM-1 through PM-10 gates,
# enforcement semantics, controlled vocabulary, RPR reconciliation, hash
# integrity, coverage boundary, and overclaim detection.
#
# This template encodes a complete governance pipeline for documentation
# changes — the most common stage type. It bundles pre-flight checks,
# boundary enforcement, verification gates, receipt generation, registry
# updates, and AI onboarding into one executable definition.
#
# Usage:
#   python scripts/run_stage.py --template stage-templates/doc-governance.yaml --stage-id <id>
# =============================================================================

template_id: doc-governance
template_version: 2
description: >
  Create or modify governance documentation — markdown docs, JSONL ledgers,
  YAML templates, CHECKER.md metadata. Includes PM-1 through PM-10
  verification, receipt, registry update, and AI onboarding handoff.

# ── Enforcement semantics (GOS-PM-2S) ───────────────────────────────
# Finding severity and gate enforcement are separate dimensions.
# BLOCKING + NOT_ENFORCED = state semantics gap (must be resolved).
enforcement_semantics:
  severity_levels:
    - BLOCKING
    - DEGRADED
    - ADVISORY
  enforcement_modes:
    - ENFORCED
    - SHADOW
    - NOT_ENFORCED
  rule: "BLOCKING + NOT_ENFORCED = state semantics gap — must be resolved"

# ── Freeze protocol ────────────────────────────────────────────────
freeze_protocol:
  state: open_scope
  allowed_states:
    - open_scope
    - enhancement_freeze
    - verification_freeze
    - closure_freeze
    - closed
  enforcement: record_only

# ── Pre-flight conditions ──────────────────────────────────────────
pre_flight:
  - id: working-tree-check
    command: "git status --porcelain"
    description: "Working tree clean or only expected paths modified"

  - id: current-truth-pre
    command: "uv run python checkers/current-truth/run.py"
    description: "No pre-existing cross-doc drift"
    on_failure:
      severity: BLOCKING
      enforcement: ENFORCED

  - id: overclaim-pre
    command: "uv run python scripts/detect_overclaim.py docs/"
    description: "No pre-existing overclaim in governed docs"
    on_failure:
      severity: BLOCKING
      enforcement: ENFORCED

# ── Scope ──────────────────────────────────────────────────────────
allowed_paths:
  - docs/**
  - AGENTS.md
  - README.md
  - stage-templates/**
  - checkers/*/CHECKER.md
  - checkers/*/run.py
  - domains/*/__init__.py
  - scripts/run_baseline.py
  - src/ordivon_verify/checker_registry.py
  - src/ordivon_verify/registry.py
  - docs/governance/document-registry.jsonl
  - docs/governance/verification-gate-manifest.json
  - docs/governance/checker-maturity-ledger.jsonl
  - docs/governance/verification-debt-ledger.jsonl
  - .github/pull_request_template.md
  - .github/workflows/ci.yml

forbidden_boundaries:
  - src/ordivon_verify/checks/**
  - src/ordivon_verify/schemas/**
  - tests/**
  - domains/*/models.py
  - domains/*/shadow.py
  - apps/**
  - evals/**
  - scripts/audit_*.py
  - scripts/smoke_*.py
  - environments/**

# ── Verification gates ─────────────────────────────────────────────
# PM-1 through PM-10 integrated. Order: fast feedback first.
verification:
  - id: pr-fast
    command: "uv run python scripts/run_baseline.py --pr-fast"
    description: "PR-fast hard gates"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 180

  - id: document-registry
    command: "uv run python scripts/check_document_registry.py"
    description: "DG registry integrity"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 60

  - id: current-truth
    command: "uv run python checkers/current-truth/run.py"
    description: "Cross-doc consistency — catches drift"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 60

  - id: verify-path-map         # PM-1
    command: "uv run python scripts/verify-path-map.py"
    description: "Generated path map matches repo reality"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 60

  - id: reconcile-registry-path  # PM-2
    command: "uv run python scripts/reconcile-registry-path.py"
    description: "Registry claims vs path observations reconciled"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 60

  - id: verify-coverage-boundary  # PM-5
    command: "uv run python scripts/verify-coverage-boundary.py"
    description: "No unknown protected files"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 60

  - id: hash-ledger              # PM-2S
    command: "uv run python scripts/hash_ledger.py --verify docs/governance/dependency-audit-debts.jsonl docs/governance/lesson-ledger.jsonl"
    description: "Ledger entry integrity — detects silent mutation"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 30

  - id: overclaim                # PM-2S
    command: "uv run python scripts/detect_overclaim.py docs/"
    description: "No banned completion vocabulary in governance docs"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 30

  - id: full-read-only
    command: "uv run python scripts/run_baseline.py --read-only"
    description: "Full baseline — comprehensive check"
    on_failure: {severity: DEGRADED, enforcement: NOT_ENFORCED}
    timeout: 300

  - id: git-diff-check
    command: "git diff --check"
    description: "No whitespace errors"
    on_failure: {severity: BLOCKING, enforcement: ENFORCED}
    timeout: 30

# ── Receipt ────────────────────────────────────────────────────────
receipt:
  output_dir: docs/runtime
  filename_pattern: "{stage_id}-receipt.md"
  required_sections:
    - stage_id
    - stage_type
    - timestamp
    - files_changed
    - verification_summary
    - boundary_statement
    - registry_updates
    - ai_onboarding_updates
    - not_claimed           # GOS-PM-2S: every receipt must declare what is NOT claimed
    - next_handoff
  controlled_vocabulary:    # GOS-PM-2S: only allowed status words
    allowed: [READY, VERIFIED, BLOCKED, OPEN, CLOSED, DEGRADED, NOT_CLAIMED]
    forbidden: [complete, done, 全绿, 全线闭合, 全部通过, 已完成, honest, perfect, finished]

# ── Registry updates ───────────────────────────────────────────────
registry:
  - action: register_new_docs
    description: "Add new docs to document-registry.jsonl with doc_type/owner/authority_domain/authority_role"
  - action: update_freshness
    description: "Update last_verified timestamp on modified docs"
  - action: update_related_ledgers
    description: "Update related_ledgers fields"
  - action: update_path_map
    description: "Regenerate path map: uv run python scripts/update-path-map.py"
  - action: update_coverage
    description: "Regenerate coverage boundary: uv run python scripts/update-coverage-boundary.py"
  - action: rehash_ledgers
    description: "Re-hash modified ledgers: uv run python scripts/hash_ledger.py <path>"

# ── AI onboarding handoff ──────────────────────────────────────────
ai_onboarding:
  - file: AGENTS.md
    update_condition: "current status line changed"
  - file: docs/ai/current-phase-boundaries.md
    update_condition: "phase timeline changed"
  - file: docs/ai/systems-reference.md
    update_condition: "commands, counts, or system descriptions changed"
  - file: docs/ai/new-ai-collaborator-guide.md
    update_condition: "current systems status block changed"

# ── Closure criteria ───────────────────────────────────────────────
closure:
  all_verification_passed: true
  no_boundary_violations: true
  receipt_written: true
  registry_updated: true
  ai_onboarding_checked: true
  current_truth_pass: true
  path_map_consistent: true           # PM-1
  rpr_blocking_zero: true             # PM-2: 0 BLOCKING reconciliation findings
  overclaim_check_pass: true          # PM-2S: no banned words in receipt
  hash_integrity_pass: true           # PM-2S: ledger hash verification passed
  coverage_no_blocked: true           # PM-5: 0 blocked protected unknown files
  not_claimed_written: true           # PM-2S: receipt includes Not Claimed section
  full_closure_not_claimed: true      # PM-2S: receipt explicitly denies full closure
