name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── pr-fast: auto-discovered checker baseline ─────────────────────────
  # Runs every checker with profile "pr-fast". Adding a checker to the
  # ecosystem (checkers/<name>/CHECKER.md + run.py) automatically includes
  # it here — no CI edit required.
  pr-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Ordivon pr-fast verification baseline (auto-discovered)
        run: uv run python scripts/run_baseline.py --pr-fast

  # ── manifest consistency: auto-generated manifest must match registry ──
  # Prevents manual manifest edits that drift from checker registry.
  manifest-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Verify manifest matches checker registry
        run: |
          uv run python scripts/run_baseline.py --manifest > /tmp/manifest.json
          python3 -c "
          import json, sys
          with open('/tmp/manifest.json') as f: gen = json.load(f)
          with open('docs/governance/verification-gate-manifest.json') as f: cur = json.load(f)
          ok = gen.get('gate_count') == cur.get('gate_count')
          if not ok:
              print(f'MANIFEST DRIFT: registry has {gen[\"gate_count\"]} gates, manifest has {cur[\"gate_count\"]}')
              sys.exit(1)
          print(f'Manifest consistent: {cur[\"gate_count\"]} gates')
          "

  # ── coding governance: exercises RiskEngine→CodingDisciplinePolicy ────
  coding-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Coding governance smoke (valid→execute, forbidden→reject)
        run: uv run python checkers/coding-smoke/run.py

  # ── Python static analysis ─────────────────────────────────────────────

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ scripts/ tests/ docs/ examples/ skills/
      - name: Ruff format (preview for Markdown)
        run: uv run ruff format --check --preview src/ scripts/ tests/ docs/ examples/ skills/ AGENTS.md

  # ── backend tests ──────────────────────────────────────────────────────

  product-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Product tests (incl. ordivon_verify package + schemas)
        run: uv run pytest tests/unit/product -q

  governance-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Governance unit tests
        run: uv run pytest tests/unit/governance -q

  finance-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Finance unit tests
        run: uv run pytest tests/unit/finance -q

  coding-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Coding pack tests
        run: uv run pytest tests/unit/packs/ -q

  # ── eval corpus ────────────────────────────────────────────────────────

  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Eval corpus (24 cases)
        run: uv run python evals/run_evals.py

  # ── Ordivon Verify smoke ───────────────────────────────────────────────

  verify-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Native Ordivon Verify
        run: uv run python scripts/ordivon_verify.py all
      - name: Native JSON report
        run: uv run python scripts/ordivon_verify.py all --json

  verify-external-ladder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Standard external (READY)
        run: >
          uv run python scripts/ordivon_verify.py all
          --root tests/fixtures/ordivon_verify_standard_external_repo
          --config tests/fixtures/ordivon_verify_standard_external_repo/ordivon.verify.json
      - name: Clean advisory (DEGRADED, exit 2)
        run: >
          EC=0;
          uv run python scripts/ordivon_verify.py all
          --root tests/fixtures/ordivon_verify_clean_external_repo
          --config tests/fixtures/ordivon_verify_clean_external_repo/ordivon.verify.json
          || EC=$?;
          if [ "$EC" != "2" ]; then echo "Expected exit 2 (DEGRADED), got $EC"; exit 1; fi
      - name: Bad external (BLOCKED, exit 1)
        run: >
          EC=0;
          uv run python scripts/ordivon_verify.py all
          --root tests/fixtures/ordivon_verify_external_repo
          --config tests/fixtures/ordivon_verify_external_repo/ordivon.verify.json
          || EC=$?;
          if [ "$EC" != "1" ]; then echo "Expected exit 1 (BLOCKED), got $EC"; exit 1; fi

  # ── frontend ───────────────────────────────────────────────────────────

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10.33.0"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint frontend
        run: pnpm lint:web
      - name: Type check frontend
        run: pnpm typecheck:web
      - name: Build frontend
        run: pnpm build:web
      - name: Frontend component tests
        run: pnpm --dir apps/web test

  # ── entropy telemetry: measure system size and complexity ────────────
  # Advisory only — accumulates metrics for entropy gate evaluation.
  # Runs on every push to maintain historical data.
  entropy-telemetry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Entropy telemetry measurement (advisory)
        run: uv run python checkers/entropy-telemetry/run.py

  # ── policy shadow runner: advisory evaluation of CandidateRules ──────
  # Runs every draft CandidateRule against red-team governance scenarios.
  # Always passes (exit 0) — accumulates evidence, never blocks.
  policy-shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Policy shadow evaluation (advisory only)
        run: uv run python checkers/policy-shadow/run.py

  # ── repo governance (PR only) ──────────────────────────────────────────
  # Classifies every PR through the CodingDisciplinePolicy pipeline.
  # For Dependabot PRs, also runs the Dependabot-specific governance checker
  # with lockfile/runtime/CI-aware classification.

  repo-governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - name: Get changed files
        run: |
          git diff --name-only \
            "${{ github.event.pull_request.base.sha }}" \
            "${{ github.event.pull_request.head.sha }}" \
            > changed_files.txt
          cat changed_files.txt
      - name: Coding governance classification
        id: coding-gov
        run: |
          EC=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            uv run python scripts/repo_governance_cli.py \
              --task-description "PR changes" \
              --file-path "$file" \
              --estimated-impact low \
              --reasoning "CI automated check" \
              --test-plan "uv run pytest" \
              --json || EC=$?
          done < changed_files.txt
          if [ "$EC" = "2" ]; then
            echo "::warning::Coding governance escalated — human review recommended"
            exit 0
          elif [ "$EC" != "0" ]; then
            echo "::error::Coding governance rejected protected path changes"
            exit $EC
          fi
      - name: Dependabot governance classification
        if: github.actor == 'dependabot[bot]'
        run: |
          FILES=$(jq -R -s -c 'split("\n") | map(select(length > 0))' changed_files.txt)
          jq -n \
            --argjson files "$FILES" \
            --arg actor "dependabot" \
            --arg title "${{ github.event.pull_request.title }}" \
            '{
              actor: $actor,
              changed_files: $files,
              ci_status: "unknown",
              is_runtime_dep: false,
              pr_title: $title,
              has_test_plan: false
            }' > pr-context.json
          uv run python checkers/dependabot-governance/run.py --input pr-context.json
