name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    env:
      PFIOS_ENV: test
      PFIOS_DEBUG: "false"
      PFIOS_DB_URL: duckdb:///./data/github-ci.duckdb
      PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
      PFIOS_REASONING_PROVIDER: mock
      PFIOS_TIMEZONE: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Compile backend modules
        run: |
          python -m compileall apps/api/app domains orchestrator governance execution state infra intelligence capabilities packs scripts shared

      - name: Run backend unit tests
        run: python -m pytest -q tests/unit

  backend-integration:
    runs-on: ubuntu-latest
    env:
      PFIOS_ENV: test
      PFIOS_DEBUG: "false"
      PFIOS_DB_URL: duckdb:///./data/github-ci.duckdb
      PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
      PFIOS_REASONING_PROVIDER: mock
      PFIOS_TIMEZONE: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run backend integration tests
        run: |
          python -m pytest -q \
            tests/integration/test_hermes_analyze_api.py \
            tests/integration/test_health_monitoring_api.py \
            tests/integration/test_scheduler_persistence.py \
            tests/integration/test_api_product_surfaces.py \
            tests/integration/test_api_semantic_outputs.py \
            tests/integration/test_workflow_run_lineage_api.py

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --dir apps/web exec tsc --noEmit

      - name: Build frontend
        run: pnpm build:web

  mvp-e2e:
    runs-on: ubuntu-latest
    needs:
      - backend-integration
      - frontend
    env:
      PFIOS_ENV: test
      PFIOS_DEBUG: "false"
      PFIOS_DB_URL: duckdb:///./data/github-ci-e2e.duckdb
      PFIOS_AUDIT_LOG_DIR: ./data/logs/audit
      PFIOS_REASONING_PROVIDER: mock
      PFIOS_TIMEZONE: Asia/Shanghai
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
      PFIOS_E2E_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Seed MVP E2E database
        run: python scripts/seed_mvp_e2e.py

      - name: Run MVP E2E smoke
        run: pnpm test:e2e -- tests/e2e/mvp-gold-path.spec.ts
