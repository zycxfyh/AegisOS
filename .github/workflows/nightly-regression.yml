name: Nightly Regression

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-kernel-red-team:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ordivon
          POSTGRES_PASSWORD: ordivon
          POSTGRES_DB: ordivon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ordivon -d ordivon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      ORDIVON_TEST_DATABASE_URL: postgresql://ordivon:ordivon@localhost:5432/ordivon
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --features postgres-integration,policy-http --all-targets -- -D warnings
      - run: cargo test --workspace --features postgres-integration,policy-http

  governance-reporting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run pytest -q
      - run: uv run python scripts/check_document_registry.py
