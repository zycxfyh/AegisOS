# Dependabot configuration — Ordivon
#
# Python/uv + GitHub Actions. npm removed (apps/web/ deleted in monorepo cleanup).

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - security/supply-chain

  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - security/supply-chain
      - python
